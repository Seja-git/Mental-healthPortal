<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | Mental Wellness Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
// Add this to check if backend is available
window.addEventListener('load', function() {
    fetch('http://127.0.0.1:5000/')
        .then(response => response.json())
        .then(data => {
            console.log('✅ Connected to backend:', data.message);
        })
        .catch(error => {
            console.warn('⚠️ Backend not running on port 5000');
            // Show warning but still allow localStorage fallback
        });
});
</script>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            min-height: 100vh;
        }
        
        .dashboard {
            padding: 20px;
            max-width: 1400px;
            margin: auto;
        }
        
        .header {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .stat-card i {
            font-size: 40px;
            color: #2b6777;
            margin-bottom: 10px;
        }
        
        .stat-number {
            font-size: 32px;
            font-weight: bold;
            color: #333;
        }
        
        .chart-container {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        
        table {
            width: 100%;
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        
        th {
            background: #2b6777;
            color: white;
        }
        
        tr:hover {
            background: #f5f5f5;
        }
        
        .status-pending { color: orange; }
        .status-resolved { color: green; }
        .status-escalated { color: red; }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="header">
            <h1>📊 Admin Dashboard</h1>
            <button onclick="exportData()" class="btn">Export Report</button>
        </div>
        
        <div class="stats-grid" id="stats">
            <!-- Stats loaded via JS -->
        </div>
        
        <div class="chart-container">
            <canvas id="trendChart"></canvas>
        </div>
        
        <div class="chart-container">
            <h3>Recent Complaints</h3>
            <table id="complaintsTable">
                <thead>
                    <tr>
                        <th>Tracking #</th>
                        <th>Category</th>
                        <th>Date</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="complaintsBody">
                    <!-- Data loaded via JS -->
                </tbody>
            </table>
        </div>
    </div>
    
    <script>
        async function loadDashboard() {
            try {
                const response = await fetch('http://localhost:5000/api/admin/stats');
                const data = await response.json();
                
                // Update stats
                document.getElementById('stats').innerHTML = `
                    <div class="stat-card">
                        <i class="fas fa-users"></i>
                        <div class="stat-number">${data.totalUsers}</div>
                        <div>Total Users</div>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-clipboard-list"></i>
                        <div class="stat-number">${data.totalAssessments}</div>
                        <div>Assessments Taken</div>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-calendar-check"></i>
                        <div class="stat-number">${data.totalAppointments}</div>
                        <div>Appointments</div>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-exclamation-triangle"></i>
                        <div class="stat-number">${data.crisisCases}</div>
                        <div>Crisis Alerts</div>
                    </div>
                `;
                
                // Load chart
                loadChart(data.trends);
                
                // Load complaints
                loadComplaints();
                
            } catch (error) {
                console.error('Error loading dashboard:', error);
            }
        }
        
        function loadChart(trends) {
            const ctx = document.getElementById('trendChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: trends.labels,
                    datasets: [{
                        label: 'Assessments',
                        data: trends.data,
                        borderColor: '#2b6777',
                        tension: 0.1
                    }]
                }
            });
        }
        
        async function loadComplaints() {
            try {
                const response = await fetch('http://localhost:5000/api/admin/complaints');
                const complaints = await response.json();
                
                document.getElementById('complaintsBody').innerHTML = complaints.map(c => `
                    <tr>
                        <td>${c.tracking_number}</td>
                        <td>${c.category}</td>
                        <td>${new Date(c.timestamp).toLocaleDateString()}</td>
                        <td class="status-${c.status}">${c.status}</td>
                        <td>
                            <button onclick="updateStatus('${c.tracking_number}')">Update</button>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('Error loading complaints:', error);
            }
        }
        
        loadDashboard();
    </script>
</body>
</html>
