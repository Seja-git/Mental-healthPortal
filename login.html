<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Mental Wellness Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
      body {
        font-family: "Poppins", sans-serif;
        margin: 0;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      
      .login-container {
        background: white;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        width: 90%;
        max-width: 400px;
        animation: slideUp 0.5s ease;
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      h2 {
        color: #2b6777;
        text-align: center;
        margin-bottom: 30px;
        font-size: 2rem;
      }

      .input-group {
        margin-bottom: 20px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        color: #333;
        font-weight: 500;
      }

      input {
        width: 100%;
        padding: 12px 15px;
        border: 2px solid #e0e0e0;
        border-radius: 10px;
        font-size: 16px;
        font-family: "Poppins", sans-serif;
        transition: all 0.3s;
        box-sizing: border-box;
      }

      input:focus {
        outline: none;
        border-color: #2b6777;
        box-shadow: 0 0 0 3px rgba(43,103,119,0.1);
      }

      button {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #2b6777, #1e4d5a);
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
        margin-top: 10px;
        font-family: "Poppins", sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }

      button:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(0,0,0,0.2);
      }

      button:disabled {
        opacity: 0.7;
        cursor: not-allowed;
      }

      .links {
        text-align: center;
        margin-top: 20px;
      }

      .links a {
        color: #2b6777;
        text-decoration: none;
        font-size: 14px;
        transition: color 0.3s;
      }

      .links a:hover {
        color: #ff4b5c;
        text-decoration: underline;
      }

      .error-message {
        background: #f8d7da;
        color: #721c24;
        padding: 12px;
        border-radius: 8px;
        margin-bottom: 20px;
        display: none;
        text-align: center;
        font-size: 14px;
      }

      .success-message {
        background: #d4edda;
        color: #155724;
        padding: 12px;
        border-radius: 8px;
        margin-bottom: 20px;
        display: none;
        text-align: center;
        font-size: 14px;
      }

      .loading-spinner {
        display: inline-block;
        width: 20px;
        height: 20px;
        border: 3px solid #f3f3f3;
        border-top: 3px solid #2b6777;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      .role-badge {
        display: inline-block;
        padding: 3px 8px;
        border-radius: 12px;
        font-size: 11px;
        font-weight: bold;
        margin-left: 5px;
      }

      .role-student { background: #e3f2fd; color: #1565c0; }
      .role-counsellor { background: #e8f5e9; color: #2e7d32; }
      .role-organization { background: #fff3e0; color: #bf360c; }
    </style>
  </head>
  <body>
    <div class="login-container">
      <h2>🌸 Welcome Back</h2>
      
      <div id="errorMessage" class="error-message">
        <i class="fas fa-exclamation-circle"></i>
        <span id="errorText"></span>
      </div>

      <div id="successMessage" class="success-message">
        <i class="fas fa-check-circle"></i>
        <span id="successText"></span>
      </div>

      <div class="input-group">
        <label><i class="fas fa-envelope" style="color: #2b6777; margin-right: 5px;"></i> Email</label>
        <input type="email" id="email" placeholder="Enter your email" value="admin@college.edu" />
      </div>

      <div class="input-group">
        <label><i class="fas fa-lock" style="color: #2b6777; margin-right: 5px;"></i> Password</label>
        <input type="password" id="password" placeholder="Enter your password" value="admin123" />
      </div>

      <button onclick="login()" id="loginBtn">
        <span id="buttonText">Login</span>
        <span id="loadingSpinner" class="loading-spinner" style="display: none;"></span>
      </button>

      <div class="links">
        <a href="signup.html"><i class="fas fa-user-plus"></i> Don't have an account? Sign up</a>
      </div>

      <div style="margin-top: 20px; padding: 15px; background: #f8f9fa; border-radius: 10px; font-size: 12px;">
        <p style="margin: 0 0 10px 0; color: #2b6777; font-weight: bold;">Demo Accounts:</p>
        <p style="margin: 5px 0;"><span class="role-badge role-student">Student</span> student@test.com / test123</p>
        <p style="margin: 5px 0;"><span class="role-badge role-counsellor">Counsellor</span> counsellor@test.com / test123</p>
        <p style="margin: 5px 0;"><span class="role-badge role-organization">Admin</span> admin@college.edu / admin123</p>
      </div>
    </div>

    <script>
      // Check if user is already logged in
      document.addEventListener('DOMContentLoaded', function() {
        const user = JSON.parse(localStorage.getItem('currentUser'));
        const token = localStorage.getItem('token');
        
        if (user && token) {
          console.log("User already logged in:", user);
          // Auto-redirect based on role
          redirectBasedOnRole(user.role);
        }

        // Check backend connection
        checkBackendConnection();
      });

      async function checkBackendConnection() {
        try {
          const response = await fetch('http://127.0.0.1:5000/');
          const data = await response.json();
          console.log('✅ Connected to backend:', data.message);
        } catch (error) {
          console.warn('⚠️ Backend not running on port 5000');
          showError('Backend server is not running. Please start it with "python app.py"');
        }
      }

      async function login() {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const errorDiv = document.getElementById("errorMessage");
        const successDiv = document.getElementById("successMessage");
        const loginBtn = document.getElementById("loginBtn");
        const buttonText = document.getElementById("buttonText");
        const loadingSpinner = document.getElementById("loadingSpinner");

        // Clear previous messages
        hideMessages();

        // Validate inputs
        if (!email || !password) {
          showError("Please enter both email and password");
          return;
        }

        // Show loading state
        loginBtn.disabled = true;
        buttonText.style.display = "none";
        loadingSpinner.style.display = "inline-block";

        try {
          console.log("Attempting login with:", { email });
          
          const response = await fetch('http://127.0.0.1:5000/api/auth/login', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({ email, password })
          });

          const data = await response.json();
          console.log("Login response:", data);

          if (response.ok) {
            // Save token and user data
            localStorage.setItem('token', data.token);
            localStorage.setItem('currentUser', JSON.stringify(data.user));
            
            // Show success message
            showSuccess(`Login successful! Welcome ${data.user.role}`);
            
            // Redirect based on role after a short delay
            setTimeout(() => {
              redirectBasedOnRole(data.user.role);
            }, 1500);
            
          } else {
            // Reset button state
            loginBtn.disabled = false;
            buttonText.style.display = "inline";
            loadingSpinner.style.display = "none";
            
            if (response.status === 401) {
              showError("Invalid email or password. Please try again.");
            } else {
              showError(data.error || "Login failed. Please try again.");
            }
          }
        } catch (error) {
          console.error("Login error:", error);
          
          // Reset button state
          loginBtn.disabled = false;
          buttonText.style.display = "inline";
          loadingSpinner.style.display = "none";
          
          showError("Cannot connect to server. Make sure backend is running on port 5000");
        }
      }

      function redirectBasedOnRole(role) {
        console.log("Redirecting based on role:", role);
        
        // Normalize role to lowercase for consistent comparison
        const normalizedRole = role ? role.toLowerCase() : '';
        
        switch(normalizedRole) {
          case 'counsellor':
          case 'counselor':  // Handle both spellings
            console.log("➡️ Redirecting to counselor dashboard");
            window.location.href = "counselor-dashboard.html";
            break;
            
          case 'organization':
          case 'admin':
            console.log("➡️ Redirecting to admin dashboard");
            window.location.href = "admin-dashboard.html";
            break;
            
          case 'student':
          default:
            console.log("➡️ Redirecting to home page");
            window.location.href = "index.html";
            break;
        }
      }

      function showError(message) {
        const errorDiv = document.getElementById("errorMessage");
        const errorText = document.getElementById("errorText");
        errorText.textContent = message;
        errorDiv.style.display = "block";
        
        // Auto hide after 5 seconds
        setTimeout(() => {
          errorDiv.style.display = "none";
        }, 5000);
      }

      function showSuccess(message) {
        const successDiv = document.getElementById("successMessage");
        const successText = document.getElementById("successText");
        successText.textContent = message;
        successDiv.style.display = "block";
      }

      function hideMessages() {
        document.getElementById("errorMessage").style.display = "none";
        document.getElementById("successMessage").style.display = "none";
      }

      // Handle Enter key press
      document.getElementById('password').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
          login();
        }
      });

      document.getElementById('email').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
          document.getElementById('password').focus();
        }
      });
    </script>
  </body>
</html>
