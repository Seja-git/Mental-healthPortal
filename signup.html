<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signup | Mental Wellness Portal</title>
    <script>
// Add this to check if backend is available
window.addEventListener('load', function() {
    fetch('http://127.0.0.1:5000/')
        .then(response => response.json())
        .then(data => {
            console.log('✅ Connected to backend:', data.message);
        })
        .catch(error => {
            console.warn('⚠️ Backend not running on port 5000');
            // Show warning but still allow localStorage fallback
        });
});
</script>
    <style>
      body {
        font-family: Poppins, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: linear-gradient(to right, #a8edea, #fed6e3);
      }
      .box {
        background: white;
        padding: 2rem;
        border-radius: 15px;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
        text-align: center;
        width: 350px;
      }
      h2 {
        color: #2b6777;
        margin-bottom: 1rem;
      }
      input,
      select,
      button {
        width: 100%;
        padding: 0.7rem;
        margin: 0.5rem 0;
        border: 1px solid #ccc;
        border-radius: 8px;
        font-family: Poppins;
      }
      button {
        background: #2b6777;
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
      }
      button:hover {
        background: #ff4b5c;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <h2>Create Account</h2>
      <select id="role">
        <option value="">-- Select Role --</option>
        <option value="Student">Student</option>
        <option value="Counsellor">Counsellor</option>
        <option value="Volunteer">Volunteer</option>
        <option value="Organization">Organization</option>
      </select>
      <input type="text" id="email" placeholder="Enter Email" />
      <input type="password" id="password" placeholder="Enter Password" />
      <button onclick="signup()">Signup</button>
    </div>


    <script>
async function signup() {
    let role = document.getElementById("role").value;
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    if (!role || !email || !password) {
        alert("All fields are required!");
        return;
    }

    try {
        const response = await fetch('http://127.0.0.1:5000/api/auth/signup', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ email, password, role })
        });

        const data = await response.json();

        if (response.ok) {
            // Save token and user data
            localStorage.setItem('token', data.token);
            localStorage.setItem('currentUser', JSON.stringify(data.user));
            
            alert("Signup successful! Your Anonymous ID is " + data.user.id);
            window.location.href = "index.html";
        } else {
            alert(data.error || "Signup failed!");
        }
    } catch (error) {
        alert("Cannot connect to server. Make sure backend is running on port 5000");
        console.error(error);
    }
}
</script>
  </body>
</html>
